services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://roadsos:roadsos@db/roadsos
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  db:
    image: postgis/postgis:16-3.4-alpine
    environment:
      - POSTGRES_USER=roadsos
      - POSTGRES_PASSWORD=roadsos
      - POSTGRES_DB=roadsos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"

  celery_worker:
    build: .
    command: celery -A app.core.celery_app worker -l info -Q default,sync --concurrency 4
    environment:
      - DATABASE_URL=postgresql+asyncpg://roadsos:roadsos@db/roadsos
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    volumes:
      - .:/app

  celery_beat:
    build: .
    command: celery -A app.core.celery_app beat -l info
    environment:
      - DATABASE_URL=postgresql+asyncpg://roadsos:roadsos@db/roadsos
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    volumes:
      - .:/app

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api

  verify:
    build: .
    command: python scripts/verify_system.py
    environment:
      - DATABASE_URL=postgresql+asyncpg://roadsos:roadsos@db/roadsos
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - api
    volumes:
      - .:/app

volumes:
  postgres_data:
